steps:
    # 1. ALWAYS CHECKOUT FIRST
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. THEN SET UP JAVA
    - name: Set up Java Development Kit (JDK) 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
